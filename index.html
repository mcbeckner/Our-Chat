<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><title>Family Chat</title>
    <style>
        :root { --mg: #075e54; --lg: #dcf8c6; --bg: #e5ddd5; --msg-bg: white; --txt: black; }
        body.dark { --bg: #1e1e1e; --msg-bg: #333; --txt: #eee; --lg: #054c44; --mg: #000; color: var(--txt); }
        body { font-family: sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; transition: 0.3s; }
        
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        #login-form { background: var(--msg-bg); padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: flex; flex-direction: column; gap: 15px; width: 300px; }
        #login-form input { padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 1em; background: var(--bg); color: var(--txt); }
        #login-form button { padding: 10px; background: var(--mg); color: white; border: none; border-radius: 5px; font-size: 1em; cursor: pointer; }
        #login-error { color: red; font-size: 0.9em; text-align: center; }

        #main-chat { flex: 1; display: flex; flex-direction: column; position: relative; }
        header { background: var(--mg); color: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 5px; }
        header button, header select, header input { background: #128c7e; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        header input { background: #0e6c62; color: white; }
        
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: auto; }
        .load-more-btn { align-self: center; background: var(--mg); color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; margin-bottom: 10px; font-size: 0.8em; opacity: 0.8; }
        
        .message { max-width: 75%; padding: 10px; border-radius: 10px; box-shadow: 0 1px 2px #0002; position: relative; background: var(--msg-bg); color: var(--txt); transition: opacity 0.3s; }
        .message.sending { opacity: 0.5; } /* Optimistic UI Style */
        .sent { align-self: flex-end; background: var(--lg); }
        .received { align-self: flex-start; }
        
        .reaction-menu { position: absolute; top: -35px; background: var(--msg-bg); border-radius: 20px; padding: 5px; display: none; gap: 8px; box-shadow: 0 2px 10px #0003; z-index: 50; border: 1px solid #8884; }
        .reaction-menu::after { content: ""; position: absolute; top: 100%; left: 0; width: 100%; height: 20px; }
        .message:hover .reaction-menu { display: flex; cursor: pointer; }
        
        .reaction-bar { position: absolute; bottom: -10px; left: 10px; background: var(--msg-bg); border-radius: 10px; padding: 2px 5px; font-size: 12px; box-shadow: 0 1px 3px #0002; display:flex; gap:2px; }
        .reply-quote { background: #0002; border-left: 3px solid #128c7e; padding: 5px; border-radius: 3px; font-size: 12px; margin-bottom: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        /* Link Preview Styles */
        .link-preview { background: rgba(0,0,0,0.05); border-radius: 5px; padding: 8px; margin-top: 5px; border-left: 3px solid var(--mg); font-size: 0.9em; display: flex; flex-direction: column; }
        .link-preview a { color: var(--mg); text-decoration: none; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .link-preview span { font-size: 0.8em; color: #666; }

        #input-area { background: var(--bg); padding: 15px; display: flex; flex-direction: column; border-top: 1px solid #ccc; }
        #reply-preview { display: none; background: #0001; padding: 5px 10px; border-left: 3px solid var(--mg); font-size: 12px; justify-content: space-between; margin-bottom: 5px; border-radius: 3px; }
        #image-preview-box { display: none; background: #0001; padding: 5px 10px; border-left: 3px solid #128c7e; font-size: 12px; align-items: center; gap: 10px; margin-bottom: 5px; border-radius: 3px; }
        #image-preview-box img { max-height: 50px; border-radius: 3px; }
        #msg-input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #888; outline: none; background: var(--msg-bg); color: var(--txt); }
        
        #sidebar { width: 250px; background: var(--bg); position: absolute; right: -250px; height: 100%; transition: 0.3s; z-index: 100; border-left: 1px solid #888; display:flex; flex-direction:column; }
        #sidebar.open { right: 0; }
        .msg-img { max-width: 100%; border-radius: 5px; cursor: pointer; margin-top: 5px; }

        #media-viewer-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 300; align-items: center; justify-content: center; }
        #media-viewer-content { max-width: 90%; max-height: 90%; display: flex; flex-direction: column; align-items: center; }
        #media-viewer-image { max-width: 100%; max-height: 80vh; object-fit: contain; }
        #media-viewer-nav { position: absolute; width: 100%; height: 100%; display: flex; justify-content: space-between; align-items: center; pointer-events: none; }
        #media-viewer-nav button { background: none; border: none; color: white; font-size: 3em; cursor: pointer; padding: 0 20px; pointer-events: auto; }
        .search-highlight { background-color: yellow; color: black; }
    </style>
</head>
<body>
<div id="login-screen">
    <h2>Welcome to Our Private Chat</h2>
    <div id="login-form">
        <input type="email" id="login-email" placeholder="Email" />
        <input type="password" id="login-password" placeholder="Password" />
        <button id="login-btn">Login</button>
        <button id="signup-btn" style="background:#5cb85c;">Sign Up (First Time Only)</button>
        <p id="login-error"></p>
    </div>
</div>

<div id="main-chat" style="display:none;">
    <header>
        <div style="display:flex;gap:5px;align-items:center;">
            <button id="dark-toggle" style="background:none;font-size:16px;">🌙</button>
            <span id="current-user-display" style="font-weight:bold;"></span>
            <input type="text" id="search-input" placeholder="Search messages..." />
        </div>
        <div style="display:flex;gap:5px;">
            <span id="other-user-status" style="font-size:12px;"></span>
            <button id="gallery-toggle">🖼️ Gallery</button>
            <button id="saved-toggle">⭐ Saved</button>
            <button id="logout-btn" style="background:red;">Logout</button>
        </div>
    </header>
    <div id="chat-container"></div>
    <div id="typing-indicator" style="font-size:12px;padding:2px 20px;height:15px;color:#888;font-style:italic"></div>
    <div id="emoji-picker" style="position: absolute; bottom: 100px; left: 10px; background: var(--msg-bg); border-radius: 10px; display: none; grid-template-columns: repeat(8, 1fr); padding: 10px; gap: 5px; z-index: 100; box-shadow: 0 2px 10px #0003;"></div>
    <div id="input-area">
        <div id="reply-preview"><span id="reply-text"></span><button onclick="cancelReply()" style="background:none;border:none;color:red;cursor:pointer">&times;</button></div>
        <div id="image-preview-box">
            <img id="image-preview" src="" alt="Image Preview">
            <span style="flex:1; margin-left:10px;">Image ready to send.</span>
            <button onclick="cancelImagePreview()" style="background:none;border:none;color:red;cursor:pointer">&times;</button>
        </div>
        <div style="display:flex; gap:10px;">
            <button id="emoji-btn" style="border:none;background:none;font-size:20px;cursor:pointer">😊</button>
            <input type="text" id="msg-input" placeholder="Message or paste image..." autocomplete="off">
            <button id="send-btn" style="background:var(--mg);color:white;border:none;padding:5px 15px;border-radius:20px;cursor:pointer">Send</button>
        </div>
    </div>
</div>

<div id="sidebar">
    <div style="background:var(--mg);color:white;padding:15px;font-weight:bold">Saved <button id="close-sidebar" style="float:right;background:none;border:none;color:white;cursor:pointer">&times;</button></div>
    <div id="saved-list" style="padding:10px;overflow-y:auto;flex:1"></div>
</div>

<div id="gallery-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center;">
    <div id="gallery-content" style="background: var(--bg); width: 80%; height: 80%; border-radius: 10px; display: flex; flex-direction: column; overflow: hidden;">
        <div style="background:var(--mg); padding:10px; display:flex; justify-content:space-between; align-items:center;">
            <span style="color:white; font-weight:bold;">Gallery</span>
            <button id="close-gallery" style="background:red; color:white; border:none; padding:5px 15px; cursor:pointer;">Close</button>
        </div>
        <div id="gal-img-view" class="grid-view"></div>
    </div>
</div>

<div id="media-viewer-modal">
    <div id="media-viewer-controls" style="position:absolute; top:10px; right:10px;"><button id="close-media-viewer" style="background:none; border:none; color:white; font-size:2em; cursor:pointer;">&times;</button></div>
    <div id="media-viewer-content"><img id="media-viewer-image" src=""><div id="media-viewer-caption" style="color:white; margin-top:10px;"></div></div>
    <div id="media-viewer-nav"><button id="media-viewer-prev">&lt;</button><button id="media-viewer-next">&gt;</button></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, serverTimestamp, setDoc, query, orderBy, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    const config = { apiKey: "AIzaSyBYv5Pu7SCh9pRkgLKA9gelk7AZIr0Gfxw", authDomain: "ourchat-34326.firebaseapp.com", projectId: "ourchat-34326", storageBucket: "ourchat-34326.firebasestorage.app", messagingSenderId: "788530048366", appId: "1:788530048366:web:cc4e06882b86988ebf657f" };
    const app = initializeApp(config), db = getFirestore(app), storage = getStorage(app), auth = getAuth(app);

    const container = document.getElementById('chat-container'), input = document.getElementById('msg-input'), picker = document.getElementById('emoji-picker');
    const imagePreviewBox = document.getElementById('image-preview-box'), imagePreview = document.getElementById('image-preview'), searchInput = document.getElementById('search-input');
    const otherUserStatus = document.getElementById('other-user-status'), currentUserDisplay = document.getElementById('current-user-display');
    const loginScreen = document.getElementById('login-screen'), loginEmail = document.getElementById('login-email'), loginPassword = document.getElementById('login-password');
    const loginBtn = document.getElementById('login-btn'), signupBtn = document.getElementById('signup-btn'), loginError = document.getElementById('login-error'), logoutBtn = document.getElementById('logout-btn');

    let currentUserRole = null, replyingTo = null, pendingImageFile = null, currentSearchTerm = '', allImageUrlsAndCaptions = [], chatUnsubscribe = null, firstLoadChat = true, msgLimit = 25;

    const ems = ['😀','😃','😄','😁','😆','😅','😂','🤣','🥲','😊','😇','🙂','🙃','😉','😌','😍','🥰','😘','😗','😙','😚','😋','😛','😝','😜','🤪','🤨','🧐','🤓','😎','👅','❤️'];
    ems.forEach(e => { const s = document.createElement('span'); s.innerText = e; s.style.cursor='pointer'; s.style.fontSize='20px'; s.onclick = (event) => { input.value += e; input.focus(); event.stopPropagation(); }; picker.appendChild(s); });
    document.getElementById('emoji-btn').onclick = (e) => { e.stopPropagation(); picker.style.display = picker.style.display === 'grid' ? 'none' : 'grid'; };
    document.addEventListener('click', () => picker.style.display = 'none');
    document.getElementById('dark-toggle').onclick = () => document.body.classList.toggle('dark');

    function notify(u, t) { if (document.hidden && Notification.permission === "granted") new Notification(`${u} messaged`, { body: t || "Sent an image" }); }
    function linkify(text) { return text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>'); }
    function highlightSearch(text, term) { if (!term) return text; const regex = new RegExp(`(${term})`, 'gi'); return text.replace(regex, '<span class="search-highlight">$1</span>'); }

    // Better Link Preview Logic
    function getLinkPreview(text) {
        const urlMatch = text.match(/(https?:\/\/[^\s]+)/g);
        if (!urlMatch) return "";
        const url = urlMatch[0];
        const domain = new URL(url).hostname;
        return `<div class="link-preview"><a href="${url}" target="_blank">${domain}</a><span>Shared Link</span></div>`;
    }

    function updateMyStatus(onlineState) {
        if (!currentUserRole) return;
        setDoc(doc(db, "status", currentUserRole), { online: onlineState, lastSeen: serverTimestamp() }, { merge: true });
    }

    onSnapshot(collection(db, "status"), (snap) => {
        if (!currentUserRole) return;
        const otherUserRole = currentUserRole === "Husband" ? "Wife" : "Husband";
        const otherData = snap.docs.find(d => d.id === otherUserRole)?.data();
        const statusEl = otherUserStatus;
        if (otherData?.online) { 
            statusEl.innerText = `${otherUserRole} is Online`; statusEl.style.color = '#28a745'; 
            // If other user is online, mark messages as read
            document.querySelectorAll('.receipt').forEach(r => r.style.color = '#34b7f1'); // Blue ticks
        }
        else if (otherData?.lastSeen) { statusEl.innerText = `Last seen ${Math.round((new Date() - otherData.lastSeen.toDate())/60000)}m ago`; statusEl.style.color = '#6c757d'; }
    });

    function createMessageElement(m, isSending = false) {
        const isMe = m.user === currentUserRole, div = document.createElement('div');
        div.className = `message ${isMe ? 'sent' : 'received'} ${isSending ? 'sending' : ''}`;
        div.id = isSending ? `sending-${Date.now()}` : `msg-${m.id}`;
        
        const rb = m.reactions ? `<div class="reaction-bar">${Object.entries(m.reactions).filter(([e,c])=>c>0).map(([e])=>e).join('')}</div>` : '';
        const receipt = isMe ? `<span class="receipt" style="margin-left:5px; font-size:10px; color:#ccc;">✔✔</span>` : '';
        const linkPreview = m.text ? getLinkPreview(m.text) : "";

        div.innerHTML = `<div class="reaction-menu">
            <span onclick="setReply('${m.text ? m.text.replace(/'/g,"\\'") : 'Image'}')">↩️</span>
            <span onclick="react('${m.id}','❤️')">❤️</span><span onclick="react('${m.id}','😂')">😂</span><span onclick="react('${m.id}','👍')">👍</span>
            ${isMe ? `<span onclick="editMsg('${m.id}','${m.text?m.text.replace(/'/g,"\\'"):''}')">✏️</span><span onclick="delMsg('${m.id}')">🗑️</span>` : ''}
        </div>
        <div style="font-size:10px;font-weight:bold">${m.user} ${m.edited?'(edited)':''}</div>
        ${m.replyTo ? `<div class="reply-quote">${m.replyTo}</div>` : ""}
        <div class="msg-body">${m.text ? highlightSearch(linkify(m.text), currentSearchTerm) : ""}</div>
        ${linkPreview}
        ${m.imageUrl ? `<img src="${m.imageUrl}" class="msg-img" onclick="openMediaViewer('${m.imageUrl}')">` : ""}
        <div style="font-size:9px;color:#888;margin-top:5px;display:flex;justify-content:space-between;align-items:center;">
            <span>${m.createdAt?new Date(m.createdAt.seconds*1000).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'Sending...'}</span>
            <div><span style="cursor:pointer;color:${m.isSaved?'#f39c12':'#ccc'}" onclick="save('${m.id}',${m.isSaved})"> ★</span> ${receipt}</div>
        </div>${rb}`;
        return div;
    }

    function startChatListener() {
        if (chatUnsubscribe) chatUnsubscribe();
        const q = query(collection(db, "messages"), orderBy("createdAt", "asc"), limitToLast(msgLimit));

        chatUnsubscribe = onSnapshot(q, (snap) => {
            const isAtBottom = container.scrollHeight - container.clientHeight <= container.scrollTop + 100;

            snap.docChanges().forEach(c => {
                const m = { id: c.doc.id, ...c.doc.data() };
                if (c.type === "added") {
                    // Remove optimistic "sending" version if it exists
                    const sendingMsg = document.querySelector('.message.sending');
                    if (sendingMsg && m.user === currentUserRole) sendingMsg.remove();

                    if (!document.getElementById(`msg-${m.id}`)) {
                        const newEl = createMessageElement(m);
                        if (firstLoadChat || isAtBottom || m.user === currentUserRole) container.appendChild(newEl);
                        else container.prepend(newEl);
                        
                        if (!firstLoadChat && (isAtBottom || m.user === currentUserRole)) {
                            setTimeout(() => { newEl.scrollIntoView({ behavior: 'auto', block: 'end' }); }, 50);
                        }
                    }
                    if (!firstLoadChat && m.user !== currentUserRole) notify(m.user, m.text);
                }
                if (c.type === "modified") {
                    const ex = document.getElementById(`msg-${m.id}`);
                    if (ex) container.replaceChild(createMessageElement(m), ex);
                }
                if (c.type === "removed") {
                    const ex = document.getElementById(`msg-${m.id}`);
                    if (ex) ex.remove();
                }
            });

            const allMsgs = snap.docs.map(d => ({id: d.id, ...d.data()}));
            allImageUrlsAndCaptions = allMsgs.filter(m => m.imageUrl).map(m => ({url: m.imageUrl, caption: m.text}));
            document.getElementById('saved-list').innerHTML = allMsgs.filter(m => m.isSaved).map(s => `<div style="font-size:12px;background:#0001;padding:8px;border-radius:5px;margin-bottom:5px;"><strong>${s.user}</strong>: ${s.text || 'Image'}</div>`).join('');

            if (snap.docs.length >= msgLimit && !document.getElementById('load-more')) {
                const btn = document.createElement('button');
                btn.id = 'load-more'; btn.className = 'load-more-btn'; btn.innerText = 'Load Older Messages';
                btn.onclick = () => { msgLimit += 25; startChatListener(); btn.remove(); };
                container.prepend(btn);
            }

            if (firstLoadChat && container.lastElementChild) {
                setTimeout(() => { container.lastElementChild.scrollIntoView({ block: 'end' }); }, 100);
            }
            firstLoadChat = false;
        });
    }

    onAuthStateChanged(auth, (user) => {
        if (user) {
            loginScreen.style.display = 'none'; document.getElementById('main-chat').style.display = 'flex';
            const email = user.email.toLowerCase();
            currentUserRole = (email === 'mitchell.beckner@gmail.com') ? 'Husband' : (email === 'demetrybeckner@gmail.com') ? 'Wife' : null;
            if (!currentUserRole) { signOut(auth); return; }
            currentUserDisplay.innerText = `Logged in as: ${currentUserRole}`;
            updateMyStatus(true);
            startChatListener();
        } else {
            loginScreen.style.display = 'flex'; document.getElementById('main-chat').style.display = 'none';
            if (chatUnsubscribe) chatUnsubscribe();
            container.innerHTML = ''; firstLoadChat = true;
        }
    });

    window.react = (id, e) => updateDoc(doc(db, "messages", id), { [`reactions.${e}`]: 1 });
    window.save = (id, s) => updateDoc(doc(db, "messages", id), { isSaved: !s });
    window.delMsg = (id) => { if(confirm("Delete?")) deleteDoc(doc(db, "messages", id)); };
    window.editMsg = (id, old) => { const nt = prompt("Edit:", old); if(nt && nt!==old) updateDoc(doc(db, "messages", id), { text: nt, edited: true }); };
    window.setReply = (t) => { replyingTo = t; document.getElementById('reply-text').innerText = t; document.getElementById('reply-preview').style.display = 'flex'; input.focus(); };
    window.cancelReply = () => { replyingTo = null; document.getElementById('reply-preview').style.display = 'none'; };
    window.cancelImagePreview = () => { pendingImageFile = null; imagePreviewBox.style.display = 'none'; };

    async function send() {
        const t = input.value.trim(); if (!t && !pendingImageFile) return;
        
        // Optimistic UI: Add message instantly
        const tempMsg = { user: currentUserRole, text: t, createdAt: null, reactions: {}, isSaved: false, replyTo: replyingTo };
        const tempEl = createMessageElement(tempMsg, true);
        container.appendChild(tempEl);
        setTimeout(() => { tempEl.scrollIntoView({ behavior: 'smooth', block: 'end' }); }, 50);

        const r = replyingTo; input.value = ""; window.cancelReply();
        let url = null;
        if (pendingImageFile) {
            const sRef = ref(storage, `chat/${Date.now()}.png`);
            const snap = await uploadBytes(sRef, pendingImageFile);
            url = await getDownloadURL(snap.ref); window.cancelImagePreview();
        }
        await addDoc(collection(db, "messages"), { text: t, imageUrl: url, user: currentUserRole, createdAt: serverTimestamp(), isSaved: false, reactions: {}, replyTo: r });
    }

    document.getElementById('send-btn').onclick = send;
    input.onkeypress = (e) => { if(e.key === 'Enter') send(); };
    document.getElementById('logout-btn').onclick = () => signOut(auth);
    document.getElementById('saved-toggle').onclick = () => document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('close-sidebar').onclick = () => document.getElementById('sidebar').classList.remove('open');
    document.getElementById('gallery-toggle').onclick = () => {
        document.getElementById('gal-img-view').innerHTML = allImageUrlsAndCaptions.map(i => `<img src="${i.url}" onclick="openMediaViewer('${i.url}')">`).join('');
        document.getElementById('gallery-modal').style.display = 'flex';
    };
    document.getElementById('close-gallery').onclick = () => document.getElementById('gallery-modal').style.display = 'none';

    window.addEventListener('paste', async e => {
        const item = Array.from(e.clipboardData.items).find(x => x.type.indexOf('image') !== -1);
        if (item) {
            pendingImageFile = item.getAsFile();
            const reader = new FileReader();
            reader.onload = (ev) => { imagePreview.src = ev.target.result; imagePreviewBox.style.display = 'flex'; };
            reader.readAsDataURL(pendingImageFile);
        }
    });

    searchInput.addEventListener('input', () => {
        currentSearchTerm = searchInput.value.toLowerCase();
        document.querySelectorAll('.message').forEach(m => {
            const body = m.querySelector('.msg-body').innerText.toLowerCase();
            m.style.display = body.includes(currentSearchTerm) ? 'block' : 'none';
        });
    });

    const mv = document.getElementById('media-viewer-modal'), mvi = document.getElementById('media-viewer-image'), mvc = document.getElementById('media-viewer-caption');
    let curImgIdx = 0;
    window.openMediaViewer = (url) => {
        curImgIdx = allImageUrlsAndCaptions.findIndex(i => i.url === url);
        showImg(curImgIdx); mv.style.display = 'flex';
    };
    function showImg(idx) {
        if (idx >= 0 && idx < allImageUrlsAndCaptions.length) {
            mvi.src = allImageUrlsAndCaptions[idx].url; mvc.innerText = allImageUrlsAndCaptions[idx].caption || '';
            curImgIdx = idx;
        }
    }
    document.getElementById('close-media-viewer').onclick = () => mv.style.display = 'none';
    document.getElementById('media-viewer-prev').onclick = () => showImg(curImgIdx - 1);
    document.getElementById('media-viewer-next').onclick = () => showImg(curImgIdx + 1);

    loginBtn.onclick = () => signInWithEmailAndPassword(auth, loginEmail.value, loginPassword.value).catch(e => loginError.innerText = e.message);
    signupBtn.onclick = () => createUserWithEmailAndPassword(auth, loginEmail.value, loginPassword.value).then(() => alert("Account Created")).catch(e => loginError.innerText = e.message);
</script>
</body>
</html>
