<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><title><3 M & D Chat <3</title>
    <style>
        :root { --mg: #075e54; --lg: #dcf8c6; --bg: #e5ddd5; --msg-bg: white; --txt: black; }
        body.dark { --bg: #1e1e1e; --msg-bg: #333; --txt: #eee; --lg: #054c44; --mg: #000; color: var(--txt); }
        body { font-family: sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; transition: 0.3s; }
        
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        #login-form { background: var(--msg-bg); padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: flex; flex-direction: column; gap: 15px; width: 300px; }
        #login-form input { padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 1em; background: var(--bg); color: var(--txt); }
        #login-form button { padding: 10px; background: var(--mg); color: white; border: none; border-radius: 5px; font-size: 1em; cursor: pointer; }
        #login-error { color: red; font-size: 0.9em; text-align: center; }

        #main-chat { flex: 1; display: flex; flex-direction: column; position: relative; }
        header { background: var(--mg); color: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        header button, header select, header input { background: #128c7e; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        
        /* PIN TO BOTTOM: Column-reverse makes the start of the div the bottom of the screen */
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column-reverse; gap: 15px; }
        #chat-list { display: flex; flex-direction: column; gap: 15px; width: 100%; }
        
        .date-divider { align-self: center; background: rgba(0,0,0,0.05); color: #666; font-size: 11px; padding: 4px 12px; border-radius: 10px; margin: 10px 0; text-transform: uppercase; font-weight: bold; }
        .load-more-btn { align-self: center; background: var(--mg); color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; margin: 10px 0; font-size: 0.8em; }
        
        .message { max-width: 75%; padding: 10px; border-radius: 10px; box-shadow: 0 1px 2px #0002; position: relative; background: var(--msg-bg); color: var(--txt); }
        .message.sending { opacity: 0.5; }
        .sent { align-self: flex-end; background: var(--lg); }
        .received { align-self: flex-start; }
        
        .reaction-menu { position: absolute; top: -35px; background: var(--msg-bg); border-radius: 20px; padding: 5px; display: none; gap: 8px; box-shadow: 0 2px 10px #0003; z-index: 50; border: 1px solid #8884; }
        .reaction-menu::after { content: ""; position: absolute; top: 100%; left: 0; width: 100%; height: 20px; }
        .message:hover .reaction-menu { display: flex; cursor: pointer; }
        
        .reaction-bar { position: absolute; bottom: -10px; left: 10px; background: var(--msg-bg); border-radius: 10px; padding: 2px 5px; font-size: 12px; box-shadow: 0 1px 3px #0002; display:flex; gap:2px; }
        .reply-quote { background: #0002; border-left: 3px solid #128c7e; padding: 5px; border-radius: 3px; font-size: 12px; margin-bottom: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .link-preview { background: rgba(0,0,0,0.05); border-radius: 5px; padding: 8px; margin-top: 5px; border-left: 3px solid var(--mg); font-size: 0.9em; }
        .link-preview a { color: var(--mg); text-decoration: none; font-weight: bold; }

        #input-area { background: var(--bg); padding: 15px; display: flex; flex-direction: column; border-top: 1px solid #ccc; z-index: 10; }
        #reply-preview, #image-preview-box { display: none; background: #0001; padding: 5px 10px; border-left: 3px solid var(--mg); font-size: 12px; margin-bottom: 5px; border-radius: 3px; }
        #image-preview-box img { max-height: 50px; border-radius: 3px; }
        #msg-input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #888; outline: none; background: var(--msg-bg); color: var(--txt); }
        
        #sidebar { width: 250px; background: var(--bg); position: absolute; right: -250px; height: 100%; transition: 0.3s; z-index: 100; border-left: 1px solid #888; display:flex; flex-direction:column; }
        #sidebar.open { right: 0; }
        .msg-img { max-width: 100%; border-radius: 5px; cursor: pointer; margin-top: 5px; }

        #gallery-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; }
        #gallery-content { background: var(--bg); width: 80%; height: 80%; border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; }
        #gallery-tabs { background: var(--mg); padding: 10px; display: flex; gap: 10px; justify-content: space-between; }
        .tab-btn { background: #128c7e; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .tab-btn.active { background: #054c44; font-weight: bold; }
        .grid-view, .list-view { padding: 15px; overflow-y: auto; flex: 1; }
        .grid-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
        .grid-view img { width: 100%; height: 120px; object-fit: cover; border-radius: 5px; }

        #media-viewer-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 300; align-items: center; justify-content: center; }
        #media-viewer-content { max-width: 90%; max-height: 90%; display: flex; flex-direction: column; align-items: center; }
        #media-viewer-image { max-width: 100%; max-height: 80vh; object-fit: contain; }
        #media-viewer-nav { position: absolute; width: 100%; height: 100%; display: flex; justify-content: space-between; align-items: center; pointer-events: none; }
        #media-viewer-nav button { background: none; border: none; color: white; font-size: 3em; cursor: pointer; padding: 0 20px; pointer-events: auto; }
    </style>
</head>
<body>
<div id="login-screen">
    <h2>"Turns out not where, but who you're with that really matters"</h2>
    <div id="login-form">
        <input type="email" id="login-email" placeholder="Email" />
        <input type="password" id="login-password" placeholder="Password" />
        <button id="login-btn">Login</button>
        <button id="signup-btn" style="background:#5cb85c;">Sign Up</button>
        <p id="login-error"></p>
    </div>
</div>

<div id="main-chat" style="display:none;">
    <header>
        <div style="display:flex;gap:5px;align-items:center;">
            <button id="dark-toggle">🌙</button>
            <span id="current-user-display" style="font-weight:bold;"></span>
        </div>
        <div style="display:flex;gap:5px;">
            <span id="other-user-status" style="font-size:12px;"></span>
            <button id="gallery-toggle">🖼️ Gallery</button>
            <button id="saved-toggle">⭐ Saved</button>
            <button id="logout-btn" style="background:red;">Logout</button>
        </div>
    </header>
    <div id="chat-container">
        <div id="chat-list"></div>
    </div>
    <div id="input-area">
        <div id="reply-preview"><span id="reply-text"></span><button onclick="cancelReply()">&times;</button></div>
        <div id="image-preview-box"><img id="image-preview" src=""><button onclick="cancelImagePreview()">&times;</button></div>
        <div style="display:flex; gap:10px;">
            <button id="emoji-btn">😊</button>
            <input type="text" id="msg-input" placeholder="Message..." autocomplete="off">
            <button id="send-btn">Send</button>
        </div>
    </div>
</div>

<div id="sidebar">
    <div style="background:var(--mg);color:white;padding:15px;font-weight:bold">Saved <button id="close-sidebar" style="float:right;">&times;</button></div>
    <div id="saved-list" style="padding:10px;overflow-y:auto;flex:1"></div>
</div>

<div id="gallery-modal">
    <div id="gallery-content">
        <div id="gallery-tabs">
            <div><button class="tab-btn active" id="tab-img">Images</button><button class="tab-btn" id="tab-lnk">Links</button></div>
            <button id="close-gallery" style="background:red; color:white;">Close</button>
        </div>
        <div id="gal-img-view" class="grid-view"></div><div id="gal-lnk-view" class="list-view" style="display:none;"></div>
    </div>
</div>

<div id="media-viewer-modal">
    <div id="media-viewer-controls" style="position:absolute; top:10px; right:10px;"><button id="close-media-viewer" style="color:white; font-size:2em;">&times;</button></div>
    <div id="media-viewer-content"><img id="media-viewer-image" src=""><div id="media-viewer-caption" style="color:white;"></div></div>
    <div id="media-viewer-nav"><button id="media-viewer-prev">&lt;</button><button id="media-viewer-next">&gt;</button></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, serverTimestamp, setDoc, query, orderBy, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    const config = { apiKey: "AIzaSyBYv5Pu7SCh9pRkgLKA9gelk7AZIr0Gfxw", authDomain: "ourchat-34326.firebaseapp.com", projectId: "ourchat-34326", storageBucket: "ourchat-34326.firebasestorage.app", messagingSenderId: "788530048366", appId: "1:788530048366:web:cc4e06882b86988ebf657f" };
    const app = initializeApp(config), db = getFirestore(app), storage = getStorage(app), auth = getAuth(app);

    const chatList = document.getElementById('chat-list'), input = document.getElementById('msg-input');
    const imagePreviewBox = document.getElementById('image-preview-box'), imagePreview = document.getElementById('image-preview');
    const otherUserStatus = document.getElementById('other-user-status'), currentUserDisplay = document.getElementById('current-user-display');
    const loginScreen = document.getElementById('login-screen'), loginEmail = document.getElementById('login-email'), loginPassword = document.getElementById('login-password');
    const loginBtn = document.getElementById('login-btn'), signupBtn = document.getElementById('signup-btn'), loginError = document.getElementById('login-error');

    let currentUserRole = null, replyingTo = null, pendingImageFile = null, allImageUrlsAndCaptions = [], chatUnsubscribe = null, msgLimit = 25;

    function formatDividerDate(date) {
        return date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
    }

    function createMessageElement(m, isSending = false) {
        const isMe = m.user === currentUserRole, div = document.createElement('div');
        div.className = `message ${isMe ? 'sent' : 'received'} ${isSending ? 'sending' : ''}`;
        div.id = isSending ? `sending-${Date.now()}` : `msg-${m.id}`;
        const rb = m.reactions ? `<div class="reaction-bar">${Object.entries(m.reactions).filter(([e,c])=>c>0).map(([e])=>e).join('')}</div>` : '';
        const receipt = isMe ? `<span class="receipt" style="margin-left:5px; font-size:10px; color:#ccc;">✔✔</span>` : '';
        const urlMatch = m.text ? m.text.match(/(https?:\/\/[^\s]+)/g) : null;
        const preview = urlMatch ? `<div class="link-preview"><a href="${urlMatch[0]}" target="_blank">${new URL(urlMatch[0]).hostname}</a></div>` : "";

        div.innerHTML = `<div class="reaction-menu">
            <span onclick="setReply('${m.text ? m.text.replace(/'/g,"\\'") : 'Image'}')">↩️</span>
            <span onclick="react('${m.id}','❤️')">❤️</span><span onclick="react('${m.id}','😂')">😂</span><span onclick="react('${m.id}','👍')">👍</span>
            ${isMe ? `<span onclick="editMsg('${m.id}','${m.text?m.text.replace(/'/g,"\\'"):''}')">✏️</span><span onclick="delMsg('${m.id}')">🗑️</span>` : ''}
        </div>
        <div style="font-size:10px;font-weight:bold">${m.user}</div>
        ${m.replyTo ? `<div class="reply-quote">${m.replyTo}</div>` : ""}
        <div class="msg-body">${m.text ? m.text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>') : ""}</div>
        ${preview}
        ${m.imageUrl ? `<img src="${m.imageUrl}" class="msg-img" onclick="openMediaViewer('${m.imageUrl}')">` : ""}
        <div style="font-size:9px;color:#888;margin-top:5px;display:flex;justify-content:space-between;align-items:center;">
            <span>${m.createdAt?new Date(m.createdAt.seconds*1000).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'...'}</span>
            <div><span style="cursor:pointer;color:${m.isSaved?'#f39c12':'#ccc'}" onclick="save('${m.id}',${m.isSaved})"> ★</span> ${receipt}</div>
        </div>${rb}`;
        return div;
    }

    function startChatListener() {
        if (chatUnsubscribe) chatUnsubscribe();
        const q = query(collection(db, "messages"), orderBy("createdAt", "asc"), limitToLast(msgLimit));
        chatUnsubscribe = onSnapshot(q, (snap) => {
            chatList.innerHTML = '';
            
            if (snap.docs.length >= msgLimit) {
                const btn = document.createElement('button'); btn.className='load-more-btn'; btn.innerText='Load Older Messages';
                btn.onclick = () => { msgLimit += 25; startChatListener(); }; chatList.appendChild(btn);
            }

            let lastDate = null;
            let tempImgs = [], tempLnks = [];
            
            snap.docs.forEach(doc => {
                const m = { id: doc.id, ...doc.data() };
                if (m.createdAt) {
                    const msgDate = new Date(m.createdAt.seconds * 1000).toDateString();
                    if (msgDate !== lastDate) {
                        const div = document.createElement('div'); div.className = 'date-divider';
                        div.innerText = formatDividerDate(new Date(m.createdAt.seconds * 1000));
                        chatList.appendChild(div);
                        lastDate = msgDate;
                    }
                }
                chatList.appendChild(createMessageElement(m));
                if (m.imageUrl) tempImgs.push(m.imageUrl);
                if (m.text) { const urls = m.text.match(/(https?:\/\/[^\s]+)/g); if(urls) urls.forEach(u => tempLnks.push({u, user:m.user})); }
            });

            allImageUrlsAndCaptions = tempImgs.map(url => ({url, caption:""}));
            document.getElementById('gal-img-view').innerHTML = tempImgs.map(url => `<img src="${url}" onclick="openMediaViewer('${url}')">`).join('');
            document.getElementById('gal-lnk-view').innerHTML = tempLnks.map(l => `<div style="background:#0001;padding:10px;margin-bottom:5px;border-radius:5px"><strong>${l.user}</strong>: <a href="${l.u}" target="_blank">${l.u}</a></div>`).join('');
            document.getElementById('saved-list').innerHTML = snap.docs.filter(d => d.data().isSaved).map(d => `<div style="font-size:12px;background:#0001;padding:8px;border-radius:5px;margin-bottom:5px;"><strong>${d.data().user}</strong>: ${d.data().text || 'Image'}</div>`).join('');
        });
    }

    onAuthStateChanged(auth, (user) => {
        if (user) {
            loginScreen.style.display = 'none'; document.getElementById('main-chat').style.display = 'flex';
            const email = user.email.toLowerCase();
            currentUserRole = (email === 'mitchell.beckner@gmail.com') ? 'Husband' : (email === 'demetrybeckner@gmail.com') ? 'Wife' : 'Guest';
            currentUserDisplay.innerText = currentUserRole;
            setDoc(doc(db, "status", currentUserRole), { online: true, lastSeen: serverTimestamp() }, { merge: true });
            startChatListener();
        }
    });

    onSnapshot(collection(db, "status"), (snap) => {
        if (!currentUserRole) return;
        const otherRole = currentUserRole === "Husband" ? "Wife" : "Husband";
        const data = snap.docs.find(d => d.id === otherRole)?.data();
        if (data?.online) { otherUserStatus.innerText = `${otherRole} Online`; otherUserStatus.style.color = '#28a745'; }
        else if (data?.lastSeen) { otherUserStatus.innerText = `Seen ${Math.round((new Date() - data.lastSeen.toDate())/60000)}m ago`; }
    });

    window.react = (id, e) => updateDoc(doc(db, "messages", id), { [`reactions.${e}`]: 1 });
    window.save = (id, s) => updateDoc(doc(db, "messages", id), { isSaved: !s });
    window.delMsg = (id) => { if(confirm("Delete?")) deleteDoc(doc(db, "messages", id)); };
    window.editMsg = (id, old) => { const nt = prompt("Edit:", old); if(nt) updateDoc(doc(db, "messages", id), { text: nt, edited: true }); };
    window.setReply = (t) => { replyingTo = t; document.getElementById('reply-text').innerText = t; document.getElementById('reply-preview').style.display = 'block'; };
    window.cancelReply = () => { replyingTo = null; document.getElementById('reply-preview').style.display = 'none'; };
    window.cancelImagePreview = () => { pendingImageFile = null; imagePreviewBox.style.display = 'none'; };

    async function send() {
        const t = input.value.trim(); if (!t && !pendingImageFile) return;
        const r = replyingTo; input.value = ""; window.cancelReply();
        let url = null;
        if (pendingImageFile) {
            const snap = await uploadBytes(ref(storage, `chat/${Date.now()}.png`), pendingImageFile);
            url = await getDownloadURL(snap.ref); window.cancelImagePreview();
        }
        await addDoc(collection(db, "messages"), { text: t, imageUrl: url, user: currentUserRole, createdAt: serverTimestamp(), isSaved: false, reactions: {}, replyTo: r });
    }

    document.getElementById('send-btn').onclick = send;
    input.onkeypress = (e) => { if(e.key === 'Enter') send(); };
    document.getElementById('logout-btn').onclick = () => { setDoc(doc(db, "status", currentUserRole), { online: false, lastSeen: serverTimestamp() }, { merge: true }); signOut(auth); };
    document.getElementById('saved-toggle').onclick = () => document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('close-sidebar').onclick = () => document.getElementById('sidebar').classList.remove('open');
    document.getElementById('gallery-toggle').onclick = () => document.getElementById('gallery-modal').style.display = 'flex';
    document.getElementById('close-gallery').onclick = () => document.getElementById('gallery-modal').style.display = 'none';
    document.getElementById('tab-img').onclick = () => { document.getElementById('gal-img-view').style.display='grid'; document.getElementById('gal-lnk-view').style.display='none'; };
    document.getElementById('tab-lnk').onclick = () => { document.getElementById('gal-img-view').style.display='none'; document.getElementById('gal-lnk-view').style.display='block'; };

    window.addEventListener('paste', async e => {
        const item = Array.from(e.clipboardData.items).find(x => x.type.indexOf('image') !== -1);
        if (item) {
            pendingImageFile = item.getAsFile();
            const reader = new FileReader(); reader.onload = (ev) => { imagePreview.src = ev.target.result; imagePreviewBox.style.display = 'block'; };
            reader.readAsDataURL(pendingImageFile);
        }
    });

    const mv = document.getElementById('media-viewer-modal'), mvi = document.getElementById('media-viewer-image');
    let curImgIdx = 0;
    window.openMediaViewer = (url) => { curImgIdx = allImageUrlsAndCaptions.findIndex(i => i.url === url); mvi.src = url; mv.style.display = 'flex'; };
    document.getElementById('close-media-viewer').onclick = () => mv.style.display = 'none';
    document.getElementById('media-viewer-prev').onclick = () => { if(curImgIdx>0) { curImgIdx--; mvi.src = allImageUrlsAndCaptions[curImgIdx].url; } };
    document.getElementById('media-viewer-next').onclick = () => { if(curImgIdx<allImageUrlsAndCaptions.length-1) { curImgIdx++; mvi.src = allImageUrlsAndCaptions[curImgIdx].url; } };

    loginBtn.onclick = () => signInWithEmailAndPassword(auth, loginEmail.value, loginPassword.value).catch(e => loginError.innerText = e.message);
    signupBtn.onclick = () => createUserWithEmailAndPassword(auth, loginEmail.value, loginPassword.value);
</script>
</body>
</html>
